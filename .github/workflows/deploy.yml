name: Deploy Entmon Website

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::547018282266:role/github
        aws-region: eu-west-2

    - name: Sync files to S3
      run: |
        aws s3 sync . s3://entmonltd \
          --exclude ".git/*" \
          --exclude ".github/*"
