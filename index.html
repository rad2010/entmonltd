<script>
document.addEventListener("DOMContentLoaded", () => {
    console.log("Inline script loaded");

    const btn = document.getElementById("callLambda");

    btn.addEventListener("click", async () => {
        console.log("Button clicked");

        try {
            // 1️⃣ Call getTime API
            const timeRes = await fetch("https://1pimyu2thk.execute-api.us-east-1.amazonaws.com/getTime");
            const timeData = await timeRes.json();
            console.log("Time API response:", timeData);

            // 2️⃣ Send metadata to storeClick API
            const payload = {
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                page: window.location.href
            };

            const clickRes = await fetch("https://1pimyu2thk.execute-api.us-east-1.amazonaws.com/storeClick", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const clickData = await clickRes.json();
            console.log("Click stored:", clickData);

            // 3️⃣ Update UI
            document.getElementById("result").innerHTML = `
                <p>${timeData.message}</p>
                <p>Server time: ${timeData.serverTime}</p>
                <p>Click logged: ${clickData.message}</p>
            `;

        } catch (err) {
            console.error("Error:", err);
        }
    });
});
</script>
