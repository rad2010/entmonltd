<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>v6Entmon Ltd | Luxury Property Agency</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="fade-in">
  <div class="logo">ENTMON LTD</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Properties</a>
    <a href="#">Landlords</a>
    <a href="#">Tenants</a>
    <a href="#">Contact</a>
    <button id="login-btn" class="nav-btn">Login</button>
    <button id="logout-btn" class="nav-btn" style="display:none;">Logout</button>
  </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content fade-in">
    <h1>Luxury Property. Exceptional Service.</h1>
    <p>Premium homes & exclusive investment opportunities.</p>
    <button onclick="scrollToSection()">Explore Listings</button>
  </div>
</section>

<!-- FEATURED LISTINGS -->
<section id="listings" class="section fade-in">
  <h2>Featured Listings</h2>

  <div class="property-grid">

    <div class="property-card">
      <img src="assets/penthouse.jpg" alt="Penthouse">
      <div class="property-info">
        <h3>City Penthouse</h3>
        <p>£1,200,000 • Manchester City Centre</p>
      </div>
    </div>

    <div class="property-card">
      <img src="assets/familyhome.jpg" alt="Family Home">
      <div class="property-info">
        <h3>Modern Family Home</h3>
        <p>£650,000 • Didsbury</p>
      </div>
    </div>

  </div>
</section>

<!-- SERVER TIME TEST -->
<section class="section fade-in">
  <h2>Server Time Test</h2>
  <button id="callLambda">Get Server Time</button>
  <div id="result"></div>
</section>

<script>
function scrollToSection() {
  document.getElementById("listings").scrollIntoView({ behavior: "smooth" });
}

document.addEventListener("DOMContentLoaded", () => {
    console.log("Inline script loaded");

    // -------------------------
    // LOGIN BUTTON
    // -------------------------
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");

    loginBtn.addEventListener("click", () => {
        window.location.href =
          "https://us-west-2v03dvdkpl.auth.us-west-2.amazoncognito.com/login" +
          "?client_id=5904tm4k2caibf3fbfg5l19305" +
          "&response_type=code" +
          "&scope=openid+email+profile" +
          "&redirect_uri=https://www.entmon.click";
    });

    logoutBtn.addEventListener("click", () => {
        window.location.href =
          "https://us-west-2v03dvdkpl.auth.us-west-2.amazoncognito.com/logout" +
          "?client_id=5904tm4k2caibf3fbfg5l19305" +
          "&logout_uri=https://wwww.entmon.click";
    });

    // -------------------------
    // SERVER TIME BUTTON
    // -------------------------
    const btn = document.getElementById("callLambda");
    if (!btn) {
        console.error("callLambda button not found");
        return;
    }

    btn.addEventListener("click", async () => {
        console.log("Button clicked");

        try {
            const timeRes = await fetch("https://1pimyu2thk.execute-api.us-east-1.amazonaws.com/getTime");
            const timeData = await timeRes.json();

            const payload = {
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                page: window.location.href
            };

            const clickRes = await fetch("https://1pimyu2thk.execute-api.us-east-1.amazonaws.com/storeClick", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const clickData = await clickRes.json();

            document.getElementById("result").innerHTML = `
                <p>${timeData.message}</p>
                <p>Server time: ${timeData.serverTime}</p>
                <p>Click logged: ${clickData.message}</p>
            `;
        } catch (err) {
            console.error("Error:", err);
        }
    });
});
</script>

</body>
</html>
